<!DOCTYPE html>
<html>
<head>
  <title>Welcome to Helpie</title>
  <style>
    body {
      background-color: black;
      color: white;
      font-family: Arial, sans-serif;
    }

    input {
      background-color: gray;
      color: white;
      padding: 10px;
      border: none;
      border-radius: 5px;
      width: 300px;
    }

    input::placeholder {
      color: white;
    }

    button {
      background-color: blue;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      margin-top: 15px; /* This moves the button down */
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Welcome to Helpie</h1>
  <p>Helpie is an A.I. assistant that can help with your feelings. You can talk to Helpie whenever you want!</p>

  <input type="text" placeholder="You can talk to Helpie here..." />
  <br />
  <button>Send</button>
</body>
</html>
